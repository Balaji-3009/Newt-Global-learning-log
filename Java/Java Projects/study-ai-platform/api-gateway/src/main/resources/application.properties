server.port=8085

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webflux.routes[0].id=auth-service

spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE

spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=notes-service

spring.cloud.gateway.server.webflux.routes[1].uri=lb://NOTES-SERVICE

spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/notes/**

spring.cloud.gateway.server.webflux.routes[2].id=quiz-service

spring.cloud.gateway.server.webflux.routes[2].uri=lb://QUIZ-SERVICE

spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/quiz/**

spring.cloud.gateway.server.webflux.routes[3].id=ai-service

spring.cloud.gateway.server.webflux.routes[3].uri=lb://AI-SERVICE

spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/ai/**

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true