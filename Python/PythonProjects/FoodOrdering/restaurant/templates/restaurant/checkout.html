{% extends 'restaurant/base.html' %}

{% block content %}

<h2>Checkout</h2>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label>Address</label>

        <textarea name="address"
                  class="form-control"
                  required></textarea>

    </div>

    <div class="mb-3">

        <label>Phone</label>

        <input type="text"
               name="phone"
               class="form-control"
               required>

    </div>

    <button class="btn btn-primary">
        Place Order
    </button>

</form>

{% endblock %}
